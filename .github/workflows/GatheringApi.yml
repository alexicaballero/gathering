name: Build and deploy .NET Core application to Web App GatheringApi

on:
  push:
    branches:
    - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: GatheringApi
  AZURE_WEBAPP_PACKAGE_PATH: ./publish
  CONFIGURATION: Release
  DOTNET_CORE_VERSION: 10.0.x
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_CORE_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore
      working-directory: ./backend

    - name: Build solution
      run: dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore
      working-directory: ./backend

    - name: Run tests
      run: dotnet test --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal --logger trx --results-directory "TestResults/"
      working-directory: ./backend

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: backend/TestResults/

    - name: Publish API project
      run: dotnet publish src/Gathering.Api/Gathering.Api.csproj --configuration ${{ env.CONFIGURATION }} --no-build --output ../publish
      working-directory: ./backend

    - name: Upload publish artifacts
      uses: actions/upload-artifact@v4
      with:
        name: webapp
        path: ./publish

  migrate:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_CORE_VERSION }}

    - name: Validate required secrets
      run: |
        if [ -z "${{ secrets.DATABASE_CONNECTION_STRING }}" ]; then
          echo "::error::Secret DATABASE_CONNECTION_STRING is not set. Go to Settings > Secrets and variables > Actions and add it."
          exit 1
        fi
        echo "Secret DATABASE_CONNECTION_STRING is configured."

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ vars.GatheringApi_CLIENT_ID_D324 }}
        tenant-id: ${{ vars.GatheringApi_TENANT_ID_D324 }}
        subscription-id: ${{ vars.GatheringApi_SUBSCRIPTION_ID_D324 }}

    - name: Allow runner IP on SQL Server firewall
      run: |
        az sql server update \
          --resource-group ${{ vars.SQL_RESOURCE_GROUP }} \
          --name ${{ vars.SQL_SERVER_NAME }} \
          --enable-public-network true
        RUNNER_IP=$(curl -s https://api.ipify.org)
        echo "Runner IP: $RUNNER_IP"
        az sql server firewall-rule create \
          --resource-group ${{ vars.SQL_RESOURCE_GROUP }} \
          --server ${{ vars.SQL_SERVER_NAME }} \
          --name github-actions-runner \
          --start-ip-address $RUNNER_IP \
          --end-ip-address $RUNNER_IP

    - name: Install EF Core tools
      run: dotnet tool install --global dotnet-ef

    - name: Restore dependencies
      run: dotnet restore
      working-directory: ./backend

    - name: Apply database migrations
      run: dotnet ef database update --project src/Gathering.Infrastructure/Gathering.Infrastructure.csproj --startup-project src/Gathering.Api/Gathering.Api.csproj --context ApplicationDbContext
      working-directory: ./backend
      env:
        ConnectionStrings__DefaultConnection: ${{ secrets.DATABASE_CONNECTION_STRING }}

    - name: Remove runner IP from SQL Server firewall
      if: always()
      run: |
        az sql server firewall-rule delete \
          --resource-group ${{ vars.SQL_RESOURCE_GROUP }} \
          --server ${{ vars.SQL_SERVER_NAME }} \
          --name github-actions-runner

  deploy:
    runs-on: ubuntu-latest
    needs: [build, migrate]
    environment: production

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: webapp
        path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ vars.GatheringApi_CLIENT_ID_D324 }}
        tenant-id: ${{ vars.GatheringApi_TENANT_ID_D324 }}
        subscription-id: ${{ vars.GatheringApi_SUBSCRIPTION_ID_D324 }}

    - name: Configure App Settings (CORS + DB)
      uses: azure/appservice-settings@v1
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        app-settings-json: |
          [
            {
              "name": "ConnectionStrings__DefaultConnection",
              "value": "${{ secrets.DATABASE_CONNECTION_STRING }}",
              "slotSetting": false
            },
            {
              "name": "Cors__AllowedOrigins__0",
              "value": "${{ vars.CORS_ALLOWED_ORIGIN }}",
              "slotSetting": false
            }
          ]

    - name: Deploy to Azure WebApp
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
